koans:
- title: 样本空间与事件
  tag: 基础
  difficulty: easy
  latex: \Omega \text{ is sample space}, A \subseteq \Omega \text{ is event}
  description: 样本空间：$\Omega$ - 所有可能结果的集合。事件：$A \subseteq \Omega$。
- title: 概率公理
  tag: 基础
  difficulty: easy
  latex: P(A) \geq 0, P(\Omega) = 1, P(\bigcup_{i=1}^{\infty} A_i) = \sum_{i=1}^{\infty}
    P(A_i)
  description: 概率公理：1. $P(A) \geq 0$；2. $P(\Omega) = 1$；3. 互斥事件：$P\left(\bigcup_{i=1}^{\infty}
    A_i\right) = \sum_{i=1}^{\infty} P(A_i)$。
- title: 条件概率
  tag: 基础
  difficulty: medium
  latex: P(A|B) = \frac{P(A \cap B)}{P(B)}
  description: 条件概率：$$P(A|B) = \frac{P(A \cap B)}{P(B)}$$
- title: 贝叶斯定理
  tag: 定理
  difficulty: medium
  latex: P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}
  description: 贝叶斯定理：$$P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)} = \frac{P(B|A) \cdot
    P(A)}{\sum_{i} P(B|A_i) \cdot P(A_i)}$$
- title: 离散随机变量
  tag: 随机变量
  difficulty: medium
  latex: p(x) = P(X = x), F(x) = P(X \leq x) = \sum_{t \leq x} p(t)
  description: 离散随机变量：概率质量函数 (PMF)：$p(x) = P(X = x)$。累积分布函数 (CDF)：$$F(x) = P(X \leq
    x) = \sum_{t \leq x} p(t)$$
- title: 连续随机变量
  tag: 随机变量
  difficulty: medium
  latex: P(a \leq X \leq b) = \int_{a}^{b} f(x) dx, F(x) = \int_{-\infty}^{x} f(t)
    dt
  description: 连续随机变量：概率密度函数 (PDF)：$$P(a \leq X \leq b) = \int_{a}^{b} f(x) dx$$累积分布函数：$$F(x)
    = P(X \leq x) = \int_{-\infty}^{x} f(t) dt$$关系：$f(x) = \frac{dF(x)}{dx}$。
- title: 期望定义
  tag: 期望与方差
  difficulty: medium
  latex: E[X] = \sum_{x} x \cdot p(x) \text{ (discrete)}, E[X] = \int_{-\infty}^{\infty}
    x \cdot f(x) dx \text{ (continuous)}
  description: 期望：离散：$$E[X] = \sum_{x} x \cdot p(x)$$连续：$$E[X] = \int_{-\infty}^{\infty}
    x \cdot f(x) dx$$性质：$E[aX + b] = aE[X] + b$，$E[X + Y] = E[X] + E[Y]$，独立时：$E[XY]
    = E[X] \cdot E[Y]$。
- title: 方差定义
  tag: 期望与方差
  difficulty: medium
  latex: \text{Var}(X) = E[(X - \mu)^2] = E[X^2] - (E[X])^2
  description: 方差：$$\text{Var}(X) = E[(X - \mu)^2] = E[X^2] - (E[X])^2$$性质：$\text{Var}(aX
    + b) = a^2 \text{Var}(X)$，独立时：$\text{Var}(X + Y) = \text{Var}(X) + \text{Var}(Y)$。
- title: 协方差与相关系数
  tag: 期望与方差
  difficulty: hard
  latex: \text{Cov}(X, Y) = E[(X - \mu_X)(Y - \mu_Y)], \rho_{X,Y} = \frac{\text{Cov}(X,
    Y)}{\sigma_X \sigma_Y}
  description: 协方差：$$\text{Cov}(X, Y) = E[(X - \mu_X)(Y - \mu_Y)] = E[XY] - E[X]E[Y]$$相关系数：$$\rho_{X,Y}
    = \frac{\text{Cov}(X, Y)}{\sigma_X \sigma_Y}$$
- title: 伯努利分布
  tag: 分布
  difficulty: easy
  latex: 'X \sim \text{Bern}(p): P(X = k) = p^k (1-p)^{1-k}, E[X] = p, \text{Var}(X)
    = p(1-p)'
  description: 伯努利分布 $X \sim \text{Bern}(p)$：$$P(X = k) = p^k (1-p)^{1-k}, \quad k
    \in \{0, 1\}$$$$E[X] = p$, $\text{Var}(X) = p(1-p)$。
- title: 二项分布
  tag: 分布
  difficulty: medium
  latex: 'X \sim \text{Bin}(n, p): P(X = k) = \binom{n}{k} p^k (1-p)^{n-k}, E[X] =
    np'
  description: 二项分布 $X \sim \text{Bin}(n, p)$：$$P(X = k) = \binom{n}{k} p^k (1-p)^{n-k}$$$$E[X]
    = np$, $\text{Var}(X) = np(1-p)$。
- title: 泊松分布
  tag: 分布
  difficulty: medium
  latex: 'X \sim \text{Pois}(\lambda): P(X = k) = \frac{\lambda^k e^{-\lambda}}{k!},
    E[X] = \lambda'
  description: 泊松分布 $X \sim \text{Pois}(\lambda)$：$$P(X = k) = \frac{\lambda^k e^{-\lambda}}{k!}$$$$E[X]
    = \lambda$, $\text{Var}(X) = \lambda$。
- title: 正态分布
  tag: 分布
  difficulty: hard
  latex: 'X \sim N(\mu, \sigma^2): f(x) = \frac{1}{\sigma\sqrt{2\pi}} \exp\left(-\frac{(x-\mu)^2}{2\sigma^2}\right)'
  description: 正态分布 $X \sim N(\mu, \sigma^2)$：$$f(x) = \frac{1}{\sigma\sqrt{2\pi}}
    \exp\left(-\frac{(x-\mu)^2}{2\sigma^2}\right)$$$E[X] = \mu$, $\text{Var}(X) =
    \sigma^2$。标准正态分布 $Z \sim N(0, 1)$：$$\phi(z) = \frac{1}{\sqrt{2\pi}} e^{-z^2/2}$$
- title: 弱大数定律
  tag: 极限定理
  difficulty: hard
  latex: \bar{X}_n = \frac{1}{n}\sum_{i=1}^{n} X_i \xrightarrow{P} \mu
  description: 弱大数定律 (WLLN)：$$\bar{X}_n = \frac{1}{n}\sum_{i=1}^{n} X_i \xrightarrow{P}
    \mu$$
- title: 中心极限定理
  tag: 极限定理
  difficulty: hard
  latex: \frac{\bar{X}_n - \mu}{\sigma/\sqrt{n}} \xrightarrow{d} N(0, 1)
  description: 中心极限定理 (CLT)：$$\frac{\bar{X}_n - \mu}{\sigma/\sqrt{n}} \xrightarrow{d}
    N(0, 1)$$即：对于大 $n$，$\bar{X}_n \approx N\left(\mu, \frac{\sigma^2}{n}\right)$。
- title: 马尔可夫不等式
  tag: 不等式
  difficulty: medium
  latex: P(X \geq a) \leq \frac{E[X]}{a}
  description: 马尔可夫不等式：$$P(X \geq a) \leq \frac{E[X]}{a}$$
- title: 切比雪夫不等式
  tag: 不等式
  difficulty: medium
  latex: P(|X - \mu| \geq k\sigma) \leq \frac{1}{k^2}
  description: 切比雪夫不等式：$$P(|X - \mu| \geq k\sigma) \leq \frac{1}{k^2}$$
- title: 矩母函数
  tag: 母函数
  difficulty: hard
  latex: M_X(t) = E[e^{tX}], E[X^n] = M_X^{(n)}(0)
  description: 矩母函数：$$M_X(t) = E[e^{tX}]$$性质：$E[X^n] = M_X^{(n)}(0)$，独立时：$M_{X+Y}(t)
    = M_X(t) \cdot M_Y(t)$。特征函数：$$\phi_X(t) = E[e^{itX}]$$唯一性定理：分布函数与特征函数一一对应。
- title: 重期望法则
  tag: 条件期望
  difficulty: hard
  latex: E[Y] = E[E[Y|X]], E[g(X)Y|X] = g(X)E[Y|X]
  description: 条件期望：重期望法则：$E[E[Y|X]] = E[Y]$，$E[g(X)Y|X] = g(X)E[Y|X]$。
- title: 马尔可夫性质
  tag: 随机过程
  difficulty: hard
  latex: P(X_{n+1} = x_{n+1} | X_n = x_n, \ldots, X_0 = x_0) = P(X_{n+1} = x_{n+1}
    | X_n = x_n)
  description: 马尔可夫性质：$$P(X_{n+1} = x_{n+1} | X_n = x_n, \ldots, X_0 = x_0) = P(X_{n+1}
    = x_{n+1} | X_n = x_n)$$转移概率：$$P_{ij} = P(X_{n+1} = j | X_n = i)$$平稳分布 $\pi$：$\pi_j
    = \sum_{i} \pi_i P_{ij}$。
