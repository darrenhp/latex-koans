koans:
- title: 字符串与子串
  tag: 基础
  difficulty: easy
  latex: |
    s = s_0 s_1 \cdots s_{n-1} \in \Sigma^n
    n = |s|
  description: 字符串：$s = s_0 s_1 \cdots s_{n-1} \in \Sigma^n$，$n = |s|$。子串：$s[l:r]
    = s_l s_{l+1} \cdots s_{r-1}$。
- title: 前缀与后缀
  tag: 基础
  difficulty: easy
  latex: |
    \text{prefix}_i(s) = s[0:i]
    \text{suffix}_i(s) = s[i:n]
  description: 前缀：$s[0:i] = \text{prefix}_i(s)$，$1 \leq i \leq n$。后缀：$s[i:n] = \text{suffix}_i(s)$，$0
    \leq i < n$。
- title: 字符串匹配定义
  tag: 基础
  difficulty: medium
  latex: \text{Match}(t, p) = \{ i \mid t[i:i+|p|] = p \}
  description: 字符串匹配：给定文本 $t$ 和模式 $p$，找到所有 $t[i:i+|p|] = p$ 的位置 $i$。
- title: 前缀函数定义
  tag: KMP
  difficulty: hard
  latex: \pi[i] = \max\{ j \mid 0 \leq j \leq i \land s[0:j] = s[i-j+1:i+1] \}
  description: '前缀函数：$\pi: \{0,1,\ldots,n-1\} \to \{-1,0,1,\ldots,n-1\}$。等价于：$\pi[i]
    = \text{最长真前缀同时也是后缀的长度}$。'
- title: KMP 匹配
  tag: KMP
  difficulty: hard
  latex: '\text{KMP}(t, p) = \{ i \in [0, n-m] : t[i:i+m] = p \}'
  description: 'KMP 匹配：给定文本 $t$ ($|t|=n$) 和模式 $p$ ($|p|=m$)，返回所有匹配位置集合。使用前缀函数 $\pi_p$ 避免文本指针回溯。时间复杂度：$O(n + m)$。'
- title: Z 函数定义
  tag: Z算法
  difficulty: hard
  latex: z[i] = \max\{ k \mid s[0:k] = s[i:i+k] \}
  description: 'Z 函数：$z: \{0,1,\ldots,n-1\} \to \mathbb{N}$。$z[i] = \max\{ k \mid
    s[0:k] = s[i:i+k] \}$。'
- title: Z 盒与递推
  tag: Z算法
  difficulty: hard
  latex: 'z[i] = \begin{cases} \min(r-i+1, z[i-l]), & i \leq r \\ 0, & i > r \end{cases}'
  description: 'Z 盒：$[l, r]$ 满足 $z[l] = r - l + 1$ 且 $r$ 最大化。递推公式：$$z[i] = \begin{cases} \min(r-i+1, z[i-l]), & i \leq r \\ 0, & i > r \end{cases}$$然后暴力扩展。$z[0] = 0$。时间复杂度：$O(n)$。'
- title: AC 自动机定义
  tag: AC自动机
  difficulty: hard
  latex: '\begin{aligned} \text{AC} &= (Q, \Sigma, \delta, \text{fail}, s_0) \\ \text{fail}(v) &= \operatorname*{argmax}_{u \in Q : u \neq v, \sigma(u) \prec \sigma(v)} |\sigma(u)| \\ \delta(v, c) &= \begin{cases} w, & (v,c,w) \in E \\ \delta(\text{fail}(v), c), & (v,c,w) \notin E \ (\forall w) \land v \neq s_0 \\ s_0, & (v,c,w) \notin E \ (\forall w) \land v = s_0 \end{cases} \end{aligned}'
  description: 'AC 自动机：形式化为五元组 $(Q, \Sigma, \delta, \text{fail}, s_0)$，其中 $\sigma(v)$ 表示状态 $v$ 对应的字符串，$E \subseteq Q \times \Sigma \times Q$ 为 Trie 边集。$\text{fail}(v)$ 为 $v$ 的最长真后缀对应的状态。$\delta(v, c)$ 递归定义：存在 Trie 边则转移，否则沿 fail 链回溯，根节点 $s_0$ 为递归基。时间复杂度：$O(\sum |p_i| + |t|)$。'
- title: 后缀数组定义
  tag: 后缀数组
  difficulty: hard
  latex: '\begin{aligned} \text{SA}[0:n-1] &\text{ is permutation of } \{0,\ldots,n-1\} \\ \text{suffix}_{\text{SA}[0]}(s) &< \text{suffix}_{\text{SA}[1]}(s) < \cdots < \text{suffix}_{\text{SA}[n-1]}(s) \\ \text{Rank}[i] &= j \iff \text{SA}[j] = i \end{aligned}'
  description: '后缀数组：$\text{SA}[0:n-1]$ 是 $\{0,1,\ldots,n-1\}$ 的排列，满足后缀字典序递增。排名数组：$\text{Rank}[i] = j \iff \text{SA}[j] = i$。构建：倍增法 $O(n \log n)$，SA-IS $O(n)$。'
- title: LCP 数组
  tag: 后缀数组
  difficulty: hard
  latex: \text{LCP}[i] = \text{lcp}(\text{suffix}_{\text{SA}[i-1]}(s), \text{suffix}_{\text{SA}[i]}(s))
  description: LCP 数组：$\text{LCP}[i] = \text{lcp}(\text{suffix}_{\text{SA}[i-1]}(s),
    \text{suffix}_{\text{SA}[i]}(s))$ 其中 $\text{lcp}(u,v) = \max\{ k \mid u[0:k] =
    v[0:k] \}$。LCP 查询（RMQ）：$$\text{lcp}(i,j) = \min_{k=\text{Rank}[i]+1}^{\text{Rank}[j]}
    \text{LCP}[k]$$
- title: 后缀自动机定义
  tag: SAM
  difficulty: hard
  latex: '\begin{aligned} \text{SAM} &= (Q, \Sigma, \delta, \text{len}, \text{link}, s_0) \\ L(\text{SAM}) &= \{ \text{suffixes of } s \} \\ |Q| &\leq 2n-1, |\delta| \leq 3n-4 \end{aligned}'
  description: '后缀自动机 (SAM)：接受 $s$ 所有后缀的最小 DFA，形式化为六元组 $(Q, \Sigma, \delta, \text{len}, \text{link}, s_0)$。$L(\text{SAM})$ 为 SAM 接受的语言（所有后缀）。状态数：$|Q| \leq 2n - 1$。转移数：$|\delta| \leq 3n - 4$。'
- title: 后缀链接与 endpos
  tag: SAM
  difficulty: hard
  latex: '\begin{aligned} \text{link}(v) &= \text{state for } \max \{ w : w \prec v, w \neq v \} \\ \text{endpos}(w) &= \{ i : s[0:i] \text{ ends with } w \} \\ \#\text{substr} &= \sum_{v \in Q} (\text{len}(v) - \text{len}(\text{link}(v))) \end{aligned}'
  description: '后缀链接：$\text{link}: Q \to Q$，指向 $v$ 的最长真后缀状态。endpos 等价类：$\text{endpos}(w) = \{ i : s[0:i] \text{ 以 } w \text{ 结尾} \}$。同一等价类中的状态在 SAM 中形成一条 link 链。不同子串数：$\sum_{v \in Q} (\text{len}(v) - \text{len}(\text{link}(v)))$。'
- title: 回文树定义
  tag: 回文树
  difficulty: hard
  latex: '\begin{aligned} \text{PAM} &= (Q, \text{next}, \text{link}, \text{len}, s_0, s_{-1}) \\ \text{next}(v, c) &= \text{state for } c \cdot \sigma(v) \cdot c \\ \text{link}(v) &= \arg\max_{u \in Q, u \neq v, \sigma(u) \text{ is suffix of } \sigma(v)} \text{len}(u) \end{aligned}'
  description: '回文树（PAM）：接受 $s$ 所有不同回文子串的自动机，形式化为六元组 $(Q, \text{next}, \text{link}, \text{len}, s_0, s_{-1})$。$\text{next}(v, c)$ 为转移函数，$\text{link}(v)$ 为后缀链接（指向 $v$ 的最长真回文后缀对应的状态）。$\text{len}(v)$ 为状态 $v$ 表示的回文串长度。状态数：$|Q| \leq n + 2$。两个根：偶数根 $s_0$（$\text{len}=0$）和奇数根 $s_{-1}$（$\text{len}=-1$）。'
- title: 最小表示法
  tag: 最小表示法
  difficulty: hard
  latex: \text{min representation} = \min\{ s[k:] + s[:k] \mid 0 \leq k < n \}
  description: 最小表示法：字符串 $s$ 的最小表示是循环同构 $\min\{ s[k:] + s[:k] \mid 0 \leq k < n \}$。算法：双指针，$O(n)$。
- title: Lyndon 分解
  tag: Lyndon分解
  difficulty: hard
  latex: '\begin{aligned} \text{Lyndon}(w) &\iff \forall i \in [1, |w|), w < w[i:] \\ s &= w_1 w_2 \cdots w_k, \forall i, \text{Lyndon}(w_i), w_1 \geq w_2 \geq \cdots \geq w_k \end{aligned}'
  description: 'Lyndon 分解：任何字符串 $s$ 可唯一分解为 $s = w_1 w_2 \cdots w_k$，其中 $w_i$ 是 Lyndon 词（$\text{Lyndon}(w) \iff \forall i \in [1, |w|), w < w[i:]$）且 $w_1 \geq w_2 \geq \cdots \geq w_k$（字典序）。Chen-Fox-Lyndon 定理：分解唯一。'
- title: Runs 理论
  tag: Runs
  difficulty: hard
  latex: '\begin{aligned} \text{Run} &= (l, r, p) \\ \text{s.t. } \forall i &\in [l, r-p], s[i:i+p] = s[i+p:i+2p] \\ &\text{maximal: } [l-1, r] \text{ or } [l, r+1] \text{ breaks periodicity} \end{aligned}'
  description: 'Runs 理论：Run 是三元组 $(l, r, p)$ 表示区间 $[l, r]$ 内所有长度为 $p$ 的子串都相同（周期为 $p$），且区间极大。形式化：$\forall i \in [l, r-p], s[i:i+p] = s[i+p:i+2p]$，且区间无法向两侧扩展。Runs 数量上界：$|\text{Runs}| \leq 3n$。'
